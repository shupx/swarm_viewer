name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.meta.outputs.build_time }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release-upload
          mkdir -p release-upload
          tar -czf release-upload/swarm-viewer-dist-latest.tar.gz -C dist .

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: swarm-viewer-release-asset
          path: release-upload/swarm-viewer-dist-latest.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Publish latest release asset
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release asset artifact
        uses: actions/download-artifact@v4
        with:
          name: swarm-viewer-release-asset
          path: release-upload

      - name: Show release asset list
        shell: bash
        run: find release-upload -type f | sort

      - name: Move latest tag to current commit
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ needs.build.outputs.head_sha }}
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest',
                sha: process.env.HEAD_SHA,
                force: true,
              });
              core.info(`Updated tag latest to ${process.env.HEAD_SHA}`);
            } catch (error) {
              if (
                error.status === 404 ||
                (error.status === 422 && /Reference does not exist/i.test(error.message || ''))
              ) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/latest',
                  sha: process.env.HEAD_SHA,
                });
                core.info(`Created tag latest at ${process.env.HEAD_SHA}`);
              } else {
                throw error;
              }
            }

      - name: Upsert latest release metadata
        uses: actions/github-script@v7
        id: latest-release
        env:
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          HEAD_SHA: ${{ needs.build.outputs.head_sha }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const tag = 'latest';
            const releaseName = 'Latest Build';
            const releaseBody = [
              `Automated latest build for commit \`${process.env.HEAD_SHA}\`.`,
              '',
              `Build time: \`${process.env.BUILD_TIME}\``,
              `Pages URL: ${process.env.PAGE_URL || 'Unavailable'}`,
              '',
              'This release contains the GitHub Pages `dist/` artifact as a downloadable archive.',
            ].join('\n');

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Updating existing release ${release.name || release.tag_name} (${release.id})`);
              const { data: updatedRelease } = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                tag_name: tag,
                target_commitish: process.env.HEAD_SHA,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
                make_latest: 'true',
              });
              core.setOutput('release_id', String(updatedRelease.id));
            } catch (error) {
              if (error.status === 404) {
                core.info('No existing latest release found, creating one');
                const { data: createdRelease } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  target_commitish: process.env.HEAD_SHA,
                  name: releaseName,
                  body: releaseBody,
                  draft: false,
                  prerelease: false,
                  make_latest: 'true',
                });
                core.setOutput('release_id', String(createdRelease.id));
              } else {
                throw error;
              }
            }

      - name: Replace latest release asset
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          script: |
            const fs = require('fs');
            const assetName = 'swarm-viewer-dist-latest.tar.gz';
            const assetPath = 'release-upload/swarm-viewer-dist-latest.tar.gz';
            const releaseId = Number('${{ steps.latest-release.outputs.release_id }}');

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            for (const asset of release.assets) {
              if (asset.name === assetName) {
                core.info(`Deleting existing asset ${asset.name} (${asset.id})`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }

            const assetData = fs.readFileSync(assetPath);
            await github.rest.repos.uploadReleaseAsset({
              url: release.upload_url,
              headers: {
                'content-type': 'application/gzip',
                'content-length': assetData.length,
              },
              name: assetName,
              data: assetData,
            });
