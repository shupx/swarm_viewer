name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_PATH: /${{ github.event.repository.name }}/

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release-upload
          mkdir -p release-upload
          tar -czf release-upload/swarm-viewer-dist-latest.tar.gz -C dist .

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: swarm-viewer-release-asset
          path: release-upload/swarm-viewer-dist-latest.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Publish latest release asset
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release asset artifact
        uses: actions/download-artifact@v4
        with:
          name: swarm-viewer-release-asset
          path: release-upload

      - name: Show release asset list
        shell: bash
        run: find release-upload -type f | sort

      - name: Move latest tag to current commit
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.sha }}
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest',
                sha: process.env.HEAD_SHA,
                force: true,
              });
              core.info(`Updated tag latest to ${process.env.HEAD_SHA}`);
            } catch (error) {
              if (
                error.status === 404 ||
                (error.status === 422 && /Reference does not exist/i.test(error.message || ''))
              ) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/latest',
                  sha: process.env.HEAD_SHA,
                });
                core.info(`Created tag latest at ${process.env.HEAD_SHA}`);
              } else {
                throw error;
              }
            }

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          make_latest: true
          target_commitish: ${{ github.sha }}
          body: |
            Automated latest build for commit `${{ github.sha }}`.

            This release contains the GitHub Pages `dist/` artifact as a downloadable archive.
          files: |
            release-upload/swarm-viewer-dist-latest.tar.gz
          overwrite_files: true
